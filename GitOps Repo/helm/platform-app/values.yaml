# ============================================================
# Base values for platform-app
# These are defaults. Override per environment in values-*.yaml
# ============================================================

# --- Basic App Info ---
nameOverride: ""
fullnameOverride: ""

# --- Replica Count ---
replicaCount: 1

# --- Container Image ---
image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# --- Service Account ---
serviceAccount:
  create: true
  annotations: {}
  name: ""

# --- Pod Configuration ---
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# --- Service ---
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# --- Ingress ---
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
    # - host: app.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []

# --- Resource Limits ---
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# --- Liveness Probe ---
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# --- Readiness Probe ---
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# --- HPA ---
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# --- PodDisruptionBudget ---
pdb:
  enabled: false
  minAvailable: 1

# --- ConfigMap ---
configmap:
  enabled: false
  data: {}

# --- Secret ---
secret:
  enabled: false
  data: {}

# --- NetworkPolicy ---
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# --- Environment Variables ---
env: []
envFrom: []

# --- Node Scheduling ---
nodeSelector: {}
tolerations: []
affinity: {}
