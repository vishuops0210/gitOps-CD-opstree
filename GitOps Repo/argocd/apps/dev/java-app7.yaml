# ============================================================
# Child Application — java-app7 (Dev)
# Purpose: Deploys app7 to the dev EKS cluster
# Sync: Auto
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-java-app7
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: dev
    app: java-app7
spec:
  project: dev
  source:
    repoURL: https://github.com/YOUR_ORG/spring-boot-realworld-example-app.git
    targetRevision: HEAD
    path: helm/platform-app
    helm:
      valueFiles:
        - values.yaml
        - ../../applications/app7/dev-values.yaml
  destination:
    server: https://dev-eks-endpoint.eks.amazonaws.com
    namespace: java-app7
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
