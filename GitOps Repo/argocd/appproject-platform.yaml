# ============================================================
# ArgoCD AppProject — Platform Apps
# Covers all 12 apps (9 microservices + 3 frontends)
# across Dev, UAT, and Prod environments.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: >-
    GitOps project for Platform Applications.
    Manages 9 microservices + 3 frontends across Dev, UAT, and Prod.

  # Source repositories allowed
  sourceRepos:
    - 'https://github.com/YOUR_ORG/spring-boot-realworld-example-app.git'

  # Destinations: all app namespaces across all environments
  destinations:
    # Dev namespaces
    - namespace: 'app1-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app2-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app3-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app4-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app5-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app6-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app7-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app8-dev'
      server: https://kubernetes.default.svc
    - namespace: 'app9-dev'
      server: https://kubernetes.default.svc
    - namespace: 'frontend1-dev'
      server: https://kubernetes.default.svc
    - namespace: 'frontend2-dev'
      server: https://kubernetes.default.svc
    - namespace: 'frontend3-dev'
      server: https://kubernetes.default.svc
    # UAT namespaces
    - namespace: 'app1-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app2-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app3-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app4-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app5-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app6-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app7-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app8-uat'
      server: https://kubernetes.default.svc
    - namespace: 'app9-uat'
      server: https://kubernetes.default.svc
    - namespace: 'frontend1-uat'
      server: https://kubernetes.default.svc
    - namespace: 'frontend2-uat'
      server: https://kubernetes.default.svc
    - namespace: 'frontend3-uat'
      server: https://kubernetes.default.svc
    # Prod namespaces
    - namespace: 'app1-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app2-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app3-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app4-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app5-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app6-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app7-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app8-prod'
      server: https://kubernetes.default.svc
    - namespace: 'app9-prod'
      server: https://kubernetes.default.svc
    - namespace: 'frontend1-prod'
      server: https://kubernetes.default.svc
    - namespace: 'frontend2-prod'
      server: https://kubernetes.default.svc
    - namespace: 'frontend3-prod'
      server: https://kubernetes.default.svc

  # Allow Namespace creation at cluster scope
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace

  # Allow standard namespace-scoped resources
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: ReplicaSet
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: ServiceAccount
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'policy'
      kind: PodDisruptionBudget

  # Detect manual kubectl changes outside GitOps
  orphanedResources:
    warn: true
