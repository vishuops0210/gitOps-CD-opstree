# ============================================================
# Parent Application — Dev Environment (App of Apps)
# Purpose: Creates all 12 child Applications for the Dev
# environment. Auto-sync means child apps are created
# immediately when this parent is applied.
#
# Dashboard: You see this as ONE tile. Click → expand to
# see all 12 child apps.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-environment
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: dev
spec:
  project: dev
  source:
    repoURL: 'https://github.com/YOUR_ORG/spring-boot-realworld-example-app.git'
    targetRevision: HEAD
    path: argocd/apps/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
