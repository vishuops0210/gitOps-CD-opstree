# ============================================================
# UAT — app1
# Sync: Manual only
# Approval: Team lead triggers via UI or CLI
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1-uat
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: uat
    app: app1
spec:
  project: platform-apps
  source:
    repoURL: https://github.com/YOUR_ORG/spring-boot-realworld-example-app.git
    targetRevision: HEAD
    path: helm/platform-app
    helm:
      valueFiles:
        - values.yaml
        - ../../applications/app1/uat-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app1-uat
  syncPolicy:
    # Manual sync only — no automated section
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 2
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
