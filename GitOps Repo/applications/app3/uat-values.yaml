# ============================================================
# uat values for java-app3
# Type: Java Microservice (Spring Boot)
# Port: 8080 | Health: /health
# ============================================================

nameOverride: "java-app3"
fullnameOverride: "java-app3"

replicaCount: 2

image:
  repository: "vishu0210/java-app3"
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 32Mi

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: java-app3-uat.example.com
      paths:
        - path: /
          pathType: Prefix

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

configmap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

networkPolicy:
  enabled: false
