# ============================================================
# dev values for dotnet-app1
# Type: .NET Microservice (ASP.NET Core)
# Port: 8080 | Health: /health
# ============================================================

nameOverride: "dotnet-app1"
fullnameOverride: "dotnet-app1"

replicaCount: 1

image:
  repository: "vishu0210/dotnet-app1"
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 10m
    memory: 32Mi
  requests:
    cpu: 10m
    memory: 32Mi

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: dotnet-app1-dev.example.com
      paths:
        - path: /
          pathType: Prefix

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

configmap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

networkPolicy:
  enabled: false
