# ============================================================
# dev values for frontend2
# Type: Frontend (Nginx static)
# Port: 80 | Health: /
# ============================================================

nameOverride: "frontend2"
fullnameOverride: "frontend2"

replicaCount: 1

image:
  repository: "docker.io/vishu0210/frontend2"
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: frontend2-dev.example.com
      paths:
        - path: /
          pathType: Prefix

# Frontends use / for health since no /health endpoint
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: false
  minAvailable: 1

configmap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

networkPolicy:
  enabled: false
