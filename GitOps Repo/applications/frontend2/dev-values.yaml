# ============================================================
# dev values for frontend2
# Type: Frontend (Nginx static)
# Port: 80 | Health: /
# ============================================================
nameOverride: frontend2
fullnameOverride: frontend2

global:
  replicaCount: 1

deployment:
  image:
    name: "docker.io/vishu0210/frontend2"
    tag: "latest"

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

service:
  type: ClusterIP
  specs:
    - name: http
      port: 80
      targetPort: 80

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: frontend2-dev.example.com
      paths:
        - path: /
          pathType: Prefix

# Frontends use / for health since no /health endpoint

pdb:
  enabled: false
  minAvailable: 1


configmap:
  enabled: false
  data: {}


secret:
  enabled: false
  data: {}


networkPolicy:
  enabled: false

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
