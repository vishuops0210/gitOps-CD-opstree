# ============================================================
# UAT values for app1
# Environment: User Acceptance Testing
# Sync: Manual (team lead triggers)
# ============================================================

nameOverride: "app1"
fullnameOverride: "app1"

replicaCount: 2

image:
  repository: "gcr.io/PROJECT_ID/app1"
  tag: "latest"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# UAT ingress
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: app1-uat.example.com
      paths:
        - path: /
          pathType: Prefix

# Probes
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# UAT may test HPA but keep it off by default
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4

pdb:
  enabled: false

configmap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

networkPolicy:
  enabled: false
