# ============================================================
# dev values for dotnet-app2
# Type: .NET Microservice (ASP.NET Core)
# Port: 8080 | Health: /health
# ============================================================
nameOverride: dotnet-app2
fullnameOverride: dotnet-app2

global:
  replicaCount: 1

deployment:
  image:
    name: "docker.io/vishu0210/dotnet-app2"
    tag: "latest"

  resources:
    limits:
      cpu: 10m
      memory: 32Mi
    requests:
      cpu: 10m
      memory: 32Mi

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

service:
  type: ClusterIP
  specs:
    - name: http
      port: 80
      targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: dotnet-app2-dev.example.com
      paths:
        - path: /
          pathType: Prefix


pdb:
  enabled: false
  minAvailable: 1


configmap:
  enabled: false
  data: {}


secret:
  enabled: false
  data: {}


networkPolicy:
  enabled: false

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80
