# ============================================================
# Prod values for frontend1
# Environment: Production
# Sync: Manual + approval gate
# ============================================================

nameOverride: "frontend1"
fullnameOverride: "frontend1"

replicaCount: 3

image:
  repository: "gcr.io/PROJECT_ID/frontend1"
  tag: "latest"

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Prod ingress
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: frontend1.example.com
      paths:
        - path: /
          pathType: Prefix

# Probes
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Prod uses HPA and PDB for high availability
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

configmap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

networkPolicy:
  enabled: false
