# ============================================================
# prod values for frontend1
# Type: Frontend (Nginx static)
# Port: 80 | Health: /
# ============================================================

nameOverride: "frontend1"
fullnameOverride: "frontend1"

replicaCount: 3

image:
  repository: "vishu0210/frontend1"
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 100m
    memory: 32Mi
  requests:
    cpu: 10m
    memory: 32Mi

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: frontend1-prod.example.com
      paths:
        - path: /
          pathType: Prefix

# Frontends use / for health since no /health endpoint
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

configmap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

networkPolicy:
  enabled: false
